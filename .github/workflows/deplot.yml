name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and Run Chatbot Locally
        run: |
          # 1. Build the Docker image directly on the EC2 host hard drive
          sudo docker build -t knowledge-bot:latest .

          # 2. Stop and remove the old running container if it exists
          sudo docker stop knowledge-bot || true
          sudo docker rm knowledge-bot || true

          # 3. Spin up the new container locally on port 8080
          sudo docker run -d \
            --name knowledge-bot \
            -p 8080:8080 \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            -e AWS_BUCKET_NAME="${{ secrets.AWS_BUCKET_NAME }}" \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            knowledge-bot:latest